{% extends "base.html" %}
{% block title %}Reenviar Verificación — U-Ride{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px">
    <div style="background:#fff;border-radius:20px;padding:48px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)">
        <div style="text-align:center;margin-bottom:28px">
            <div style="width:70px;height:70px;border-radius:50%;background:rgba(220,38,38,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:2rem;color:#dc2626">
                <i class="fas fa-envelope"></i>
            </div>
            <h2 style="font-weight:800;font-size:1.5rem;margin-bottom:6px">Reenviar verificación</h2>
            <p style="color:#6b7280;font-size:.875rem;line-height:1.6">Ingresa tu correo institucional y te enviaremos un nuevo enlace de verificación.</p>
        </div>

        <form method="post" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label-uride"><i class="fas fa-envelope me-1" style="color:var(--accent)"></i>Correo institucional</label>
                <input type="email" name="email" class="form-control-uride" placeholder="tu@uta.edu.ec" required>
            </div>
            <button type="submit" class="btn-uride btn-primary-uride btn-full btn-lg-uride">
                <i class="fas fa-redo"></i> Reenviar enlace
            </button>
        </form>

        <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
            <a href="{{ url_for('auth.login') }}" style="color:var(--accent);font-weight:600;font-size:.875rem">
                <i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
