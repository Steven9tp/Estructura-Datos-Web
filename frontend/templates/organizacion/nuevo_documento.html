{% extends "base.html" %}
{% block title %}Publicar Documento{% endblock %}
{% block page_title %}<i class="fas fa-file-upload me-2" style="color:var(--accent)"></i>Publicar Documento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card-uride">
            <div class="card-header-uride">
                <h6 class="fw-bold mb-0">Nuevo Documento Institucional</h6>
            </div>
            <div class="card-body-uride">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="form-group mb-4">
                        <label class="form-label-uride">Título del Documento *</label>
                        <input type="text" name="titulo" class="form-control-uride"
                               placeholder="Ej: Reglamento de Graduación 2026" required>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label-uride">Categoría *</label>
                        <select name="categoria_id" class="form-control-uride form-select-uride" required>
                            <option value="">Selecciona una categoría...</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label-uride">Enlace o Ruta del Archivo (Opcional)</label>
                        <input type="text" name="ruta_archivo" class="form-control-uride"
                               placeholder="https://uta.edu.ec/doc.pdf">
                    </div>

                    <div class="text-end">
                        <a href="{{ url_for('organizacion.documentos') }}" class="btn-uride btn-ghost me-2">
                            Cancelar
                        </a>
                        <button type="submit" class="btn-uride btn-primary-uride">
                            <i class="fas fa-save me-1"></i>Publicar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
